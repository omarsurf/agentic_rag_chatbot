version: "3.8"

services:
  # ==========================================================================
  # Qdrant Vector Database
  # ==========================================================================
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: gri-rag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__LOG_LEVEL=INFO
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - gri-network

  # ==========================================================================
  # PostgreSQL (Session & Feedback Persistence)
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: gri-rag-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gri_secret_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-gri_rag}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gri}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gri-network

  # ==========================================================================
  # Redis (Distributed Rate Limiting & Session Cache)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: gri-rag-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gri-network

  # ==========================================================================
  # GRI RAG API
  # ==========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gri-rag-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=qdrant
      - QDRANT_PORT=6333
      - POSTGRES_DSN=postgresql://${POSTGRES_USER:-gri}:${POSTGRES_PASSWORD:-gri_secret_change_me}@postgres:5432/${POSTGRES_DB:-gri_rag}
      - REDIS_URL=redis://redis:6379/0
      - SESSION_BACKEND=redis
      - API_RELOAD=false
      - API_WORKERS=4
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro
      - ./reports:/app/reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - gri-network

volumes:
  qdrant_storage:
    driver: local
  qdrant_snapshots:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  gri-network:
    name: gri-rag-network
    driver: bridge
